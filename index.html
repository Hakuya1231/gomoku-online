<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>五子棋 Gomoku</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="brand">
          <div class="logo" aria-hidden="true"></div>
          <div>
            <div class="title">五子棋</div>
            <div class="subtitle" id="subtitle">本地双人对战 · 15×15</div>
          </div>
        </div>

        <div class="controls">
          <div class="status" id="status">加载中…</div>
          <div class="buttons">
            <button class="btn" id="btnRestart" type="button">重开</button>
          </div>
        </div>
      </header>

      <main class="main">
        <section class="boardCard">
          <div class="boardWrap">
            <canvas id="board" width="720" height="720" aria-label="五子棋棋盘"></canvas>
          </div>
          <div class="hint">
            提示：点击棋盘落子。黑先。连成五子即胜。你也可以用键盘 <kbd>R</kbd> 重开。
          </div>
        </section>

        <aside class="side">
          <section class="panel">
            <div class="panelTitle">设置</div>
            <div class="panelBody">
              <label class="row">
                <span>对战</span>
                <select id="gameMode">
                  <option value="PVP" selected>双人</option>
                  <option value="AI">人机</option>
                  <option value="ONLINE">在线联机</option>
                </select>
              </label>
              <label class="row">
                <span>你执</span>
                <select id="humanSide">
                  <option value="B" selected>黑</option>
                  <option value="W">白</option>
                </select>
              </label>
              <label class="row">
                <span>难度</span>
                <select id="aiLevel">
                  <option value="1" selected>简单</option>
                  <option value="2">中等</option>
                  <option value="3">困难</option>
                </select>
              </label>
              <label class="row">
                <span>棋盘大小</span>
                <select id="boardSize">
                  <option value="15" selected>15 × 15</option>
                  <option value="19">19 × 19</option>
                </select>
              </label>
              <div class="row">
                <span>坐标</span>
                <label class="switch">
                  <input id="toggleCoords" type="checkbox" checked />
                  <span class="slider"></span>
                </label>
              </div>
              <div class="row">
                <span>提示线</span>
                <label class="switch">
                  <input id="toggleHints" type="checkbox" checked />
                  <span class="slider"></span>
                </label>
              </div>
              <div class="row">
                <span>禁手规则</span>
                <label class="switch">
                  <input id="toggleForbidden" type="checkbox" />
                  <span class="slider"></span>
                </label>
              </div>
            </div>
          </section>

          <section class="panel" id="onlinePanel" style="display: none;">
            <div class="panelTitle">联机对战</div>
            <div class="panelBody">
              <div id="linkSection" style="display: none;">
                <div style="font-size: 12px; color: var(--muted); margin-bottom: 8px;">分享链接给对手：</div>
                <div style="display: flex; gap: 8px; align-items: center;">
                  <input type="text" id="shareLinkInput" readonly style="flex: 1; font-size: 11px; padding: 6px 8px;">
                  <button class="btn" id="btnCopyLink" type="button" style="padding: 6px 10px;">复制</button>
                </div>
              </div>
              <div id="connectSection">
                <button class="btn" id="btnCreateRoom" type="button" style="width: 100%;">创建房间</button>
              </div>
              <div class="row" style="margin-top: 12px;">
                <span style="font-size: 12px;">状态:</span>
                <span id="connectionStatus" style="font-size: 12px; color: var(--accent);">未连接</span>
              </div>
              <div class="row">
                <span style="font-size: 12px;">房间:</span>
                <span id="roomIdDisplay" style="font-size: 12px; color: var(--text); font-weight: 600;">-</span>
              </div>
              <div class="row">
                <span style="font-size: 12px;">对手:</span>
                <span id="opponentInfo" style="font-size: 12px; color: var(--text); font-weight: 600;">-</span>
              </div>
              <button class="btn" id="btnDisconnect" type="button" style="width: 100%; margin-top: 12px; display: none;">断开连接</button>
            </div>
          </section>

          <section class="panel">
            <div class="panelTitle">对局信息</div>
            <div class="panelBody">
              <div class="kv">
                <div class="k">步数</div>
                <div class="v" id="moveCount">0</div>
              </div>
              <div class="kv">
                <div class="k">上一步</div>
                <div class="v mono" id="lastMove">-</div>
              </div>
              <div class="kv">
                <div class="k">胜者</div>
                <div class="v" id="winner">-</div>
              </div>
            </div>
          </section>
        </aside>
      </main>

      <footer class="footer">
        <span>纯前端 · 支持本地/联机对战</span>
        <span class="dot">•</span>
        <span>Canvas 渲染</span>
        <span class="dot">•</span>
        <span>基于 Firebase 实时联机</span>
      </footer>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
